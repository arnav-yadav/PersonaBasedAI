<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scaler Persona Chat — Talk to Anshuman, Abhimanyu & Kshitij</title>
    <meta
      name="description"
      content="Have real conversations with three Scaler/InterviewBit personalities — Anshuman Singh, Abhimanyu Saxena, and Kshitij Mishra — powered by AI."
    />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header class="app-header">
        <div class="header-logo" id="header-logo">S</div>
        <div class="header-text">
          <h1>Scaler Persona Chat</h1>
          <p>Powered by Gemini AI · Prompt Engineering Assignment</p>
        </div>
        <div class="header-badge">Live AI</div>
      </header>

      <!-- Persona Tabs (dynamically built by main.js) -->
      <div class="tab-bar" id="persona-tabs" role="tablist" aria-label="Select persona"></div>

      <!-- Persona Identity Bar -->
      <div class="persona-identity" aria-live="polite">
        <div id="persona-accent-bar" aria-hidden="true"></div>
        <div id="persona-avatar" aria-hidden="true">AS</div>
        <div class="persona-info">
          <div id="persona-name">Anshuman Singh</div>
          <div id="persona-title">Co-founder, Scaler &amp; InterviewBit</div>
          <div id="persona-subtitle">Ex-Facebook Engineer · ACM ICPC World Finalist</div>
        </div>
        <div class="persona-online" aria-label="Online">
          <div class="online-dot"></div>
          Online
        </div>
      </div>

      <!-- Chat Messages -->
      <main class="chat-area" id="chat-messages" aria-live="polite" aria-label="Chat messages"></main>

      <!-- Suggestion Chips -->
      <div id="chips-wrapper" role="list" aria-label="Suggested questions"></div>

      <!-- Input Area -->
      <div class="input-area">
        <textarea
          id="chat-input"
          placeholder="Ask anything…"
          rows="1"
          aria-label="Message input"
        ></textarea>
        <button id="send-btn" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
